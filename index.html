<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Helena Maruf (Bugahontas)">
  <meta name="description" content="Landing page">
  <title>Error 404</title>
  <link rel="shortcut icon" href="favicon/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet"> 
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">

  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="card flex-column" style="display: none;">
    <!-----------------Slide 1----------------->
    <div class="content content-1 flex-column" style="display: none;">
      <div class="error-art">
        <div class="tooltip flex-row">
          <span class="tooltip-text">ERROR</span>
        </div>
        <div class="error-type flex-row">
          <span class="error-number">4</span>
          <div class="ladybug flex-row">
            <div class="ladybug-body flex-row">
              <div class="spot spot-1"></div>
              <div class="spot spot-2"></div>
              <div class="spot spot-3"></div>
              <div class="spot spot-4"></div>
              <div class="spot spot-5"></div>
            </div>
          </div>
          <span class="error-number">4</span>
        </div>
        <p class="error-description">Page not found</p>
      </div>

      <p class="message">Relax! Bugs happen...</p>

      <div class="button btn-about flex-row"><span>About this page</span></div>
    </div>
    <!-----------------Slide 2----------------->
    <div class="content content-2 flex-column" style="display: none;">
      <div class="explanation flex-row">
        <p><span class="exp-highlight-begin">Don't worry! No problems here.</span> It's just a web page deliberately designed to show the 404 error in a different way: with <span class="exp-highlight-end">art</span> and <span class="exp-highlight-end">fun</span>!</p>
      </div>

      <div class="button btn-why flex-row"><span>Why <span class="btn-highlight">Error 404</span>?</span></div>
    </div>
    <!-----------------Slide 3----------------->
    <div class="content content-3 flex-column" style="display: none;">
      <div class="explanation flex-column">
        <p>It's a famous bug caused by:</p>
        <ul class="reasons">
          <li>Wrong URLs</li>
          <li>Broken links</li>
          <li>Malwares</li>
        </ul>
        <!-- <p>Sure you've already got this error!</p> -->
      </div>

      <div class="button btn-why flex-row"><span>Why <span class="btn-highlight"></span>?</span></div>
    </div>

  </div>



  <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>

  <script src="index.js"></script>
  
  <!-- <p class="final-message">A webpage made with <span class="html5-highlight">HTML5</span>, <span class="css3-highlight">CSS3</span> and <i class="bi bi-heart-fill"></i></p> -->

</body>
</html>
