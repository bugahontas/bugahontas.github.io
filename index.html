<html lang="en">
<head>

  <meta name="description" content="Landing page">
  <title>Error 404</title>
  <link rel="shortcut icon" href="favicon/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet"> 
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">

  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="card flex-column" style="display: none;">
    
    <div class="content content-1 flex-column" style="display: none;">
      <div class="error-art flex-column">
        <div class="tooltip flex-row">
          <span class="tooltip-text">ERROR</span>
        </div>
        
        <div class="error-type flex-row">
          <span class="error-number">4</span>
          <div class="ladybug flex-row">
            <div class="ladybug-body flex-row">
              <div class="spot spot-1"></div>
              <div class="spot spot-2"></div>
              <div class="spot spot-3"></div>
              <div class="spot spot-4"></div>
              <div class="spot spot-5"></div>
            </div>
          </div>
          <span class="error-number">4</span>
        </div>
      </div>
      
      <div class="infos flex-column">
        <p class="error-description">Page not found</p>
        <p class="message">Relax! Bugs happen...</p>
        <!-- <a class="flex-row btn-about" href="https://github.com/bugahontas" target="_blank"><i class="bi bi-github"></i>Bugahontas</a> -->
        <div class="button btn-about flex-row"><span>About this page</span></div>
      </div>
    </div>

    <div class="content content-2 flex-column" style="display: none;">
      <p class="explanation"><span class="exp-highlight">Don't worry! No problems here.</span> It's just a web page deliberately designed to show the 404 error in a different way: with art and fun!</p>
      <div class="button btn-info flex-row"><span>What is error 404?</span></div>
    </div>
  </div>



  <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>

  <script src="index.js"></script>
